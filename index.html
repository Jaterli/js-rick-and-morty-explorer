<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rick and Morty Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>
                    <i class="fas fa-circle-notch"></i>
                    Rick and Morty <span>Explorer</span>
                </h1>

                <!-- Navegación principal -->
                <nav class="main-nav">
                    <div class="view-buttons">
                        <button class="nav-btn active" data-view="characters">
                            <i class="fas fa-users"></i> Personajes
                        </button>
                        <button class="nav-btn" data-view="episodes">
                            <i class="fas fa-tv"></i> Episodios
                        </button>
                    </div>
                    <button id="favoritesBtn" class="nav-btn favorites-nav-btn" data-view="favorites">
                        <i class="fas fa-heart"></i>
                        <span>Favoritos</span>
                        <span id="favoritesCount" class="favorites-count">0</span>
                    </button>
                </nav>

            </div>
        </header>

        <!-- Vista de Personajes -->
        <div id="charactersView" class="view active">
            
            <div class="seccion-header">
                <h2><i class="fas fa-users"></i> Personajes</h2>
                <!-- Filtros -->
                <div class="filters-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar personaje...">
                    </div>
                    <div class="filter-group">
                        <select id="statusFilter">
                            <option value="">Todos los estados</option>
                            <option value="alive">Vivo</option>
                            <option value="dead">Muerto</option>
                            <option value="unknown">Desconocido</option>
                        </select>
                        <select id="speciesFilter">
                            <option value="">Todas las especies</option>
                            <option value="human">Humano</option>
                            <option value="alien">Alienígena</option>
                            <option value="humanoid">Humanoide</option>
                            <option value="mythological">Mitológico</option>
                            <option value="animal">Animal</option>
                            <option value="robot">Robot</option>
                            <option value="cronenberg">Cronenberg</option>
                            <option value="disease">Enfermedad</option>
                            <option value="poopybutthole">Poopybutthole</option>
                            <option value="unknown">Desconocida</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Loading y Error -->
            <div id="loadingIndicator" class="loading-indicator hidden">
                <div class="spinner"></div>
                <p>Cargando personajes...</p>
            </div>
            <div id="errorMessage" class="error-message hidden"></div>

            <!-- Grid de personajes -->
            <div id="charactersGrid" class="characters-grid"></div>

            <!-- Paginación -->
            <div class="pagination" id="pagination">
                <button id="prevPage" class="page-btn" disabled>
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                <span id="pageInfo" class="page-info">Página 1</span>
                <button id="nextPage" class="page-btn">
                    Siguiente <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Vista de Episodios -->
        <div id="episodesView" class="view">
            
            <div class="seccion-header">
                <h2><i class="fas fa-tv"></i> Episodios</h2>
                <div class="episodes-search">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="episodeSearch" placeholder="Buscar episodio...">
                    </div>
                </div>
            </div>
            <div id="episodesLoading" class="loading-indicator hidden">
                <div class="spinner"></div>
                <p>Cargando episodios...</p>
            </div>
            <div id="episodesGrid" class="episodes-grid"></div>
            <div class="pagination" id="episodesPagination">
                <button id="episodesPrevPage" class="page-btn" disabled>
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                <span id="episodesPageInfo" class="page-info">Página 1</span>
                <button id="episodesNextPage" class="page-btn">
                    Siguiente <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Modal de Detalle -->
        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="modal-close">X</span>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="js/favorites.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
